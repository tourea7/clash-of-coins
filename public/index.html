<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Clash of Coins</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:url('/Bg.png') center/cover no-repeat fixed;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Rajdhani',sans-serif;color:#fff;flex-direction:column;gap:16px}
.spinner{width:44px;height:44px;border:3px solid rgba(255,215,0,.2);border-top-color:#FFD700;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.msg{font-size:14px;color:rgba(255,255,255,.5)}
</style>
</head>
<body>
<div style="font-size:48px;filter:drop-shadow(0 0 20px #FFD700)">👑</div>
<div class="spinner"></div>
<div class="msg" id="msg">Chargement...</div>

<script>
const ADMIN_EMAILS = ['horizonmanagement24@gmail.com'];

async function start(){
  // Handle OAuth callback
  if(window.location.hash.includes('access_token') || window.location.search.includes('code=')){
    document.getElementById('msg').textContent = 'Finalisation de la connexion...';
    window.location.href = '/auth.html' + window.location.hash + window.location.search;
    return;
  }

  try {
    // Load Supabase config from server
    const cfg = await fetch('/api/config').then(r => r.json());
    const sb = window.supabase.createClient(cfg.supabase_url, cfg.supabase_anon);

    // Check session
    const { data: { session } } = await sb.auth.getSession();

    if(!session){
      // Not logged in → go to login page
      document.getElementById('msg').textContent = 'Redirection vers la connexion...';
      window.location.href = '/auth.html';
      return;
    }

    const user = session.user;

    // Redirect based on role
    if(ADMIN_EMAILS.includes(user.email)){
      document.getElementById('msg').textContent = 'Accès admin...';
      window.location.href = '/admin.html';
    } else {
      document.getElementById('msg').textContent = 'Chargement du jeu...';
      window.location.href = '/dashboard.html';
    }

  } catch(e) {
    document.getElementById('msg').textContent = 'Erreur de connexion — réessai...';
    setTimeout(start, 2000);
  }
}

start();
</script>
</body>
</html>
